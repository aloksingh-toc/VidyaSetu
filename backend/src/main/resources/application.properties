# ─────────────────────────────────────────────
# VidyaSetu API — application.properties
# Environment-specific secrets come from .env
# ─────────────────────────────────────────────

spring.application.name=vidyasetu-api

# ── Active profile (override in prod) ──
spring.profiles.active=${APP_PROFILE:dev}

# ── Database ──
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/vidyasetu?TimeZone=UTC}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:vidyasetu_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── JWT ──
jwt.access.secret=${JWT_ACCESS_SECRET:dev-access-secret-change-in-prod-min-256bits}
jwt.access.expiration.ms=900000
jwt.refresh.secret=${JWT_REFRESH_SECRET:dev-refresh-secret-change-in-prod-min-256bits}
jwt.refresh.expiration.ms=2592000000

# ── Cookie ──
cookie.secure=${COOKIE_SECURE:false}
cookie.same-site=Strict
cookie.domain=${COOKIE_DOMAIN:localhost}

# ── WhatsApp ──
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.webhook.verify.token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
whatsapp.enabled=${WHATSAPP_ENABLED:false}

# ── SMS (Fast2SMS) ──
fast2sms.api.key=${FAST2SMS_API_KEY:}
fast2sms.enabled=${FAST2SMS_ENABLED:false}

# ── Cloudflare R2 ──
r2.bucket.name=${R2_BUCKET_NAME:vidyasetu-dev}
r2.account.id=${CF_ACCOUNT_ID:}
r2.access.key.id=${CF_R2_ACCESS_KEY_ID:}
r2.secret.access.key=${CF_R2_SECRET_ACCESS_KEY:}
r2.public.url=${R2_PUBLIC_URL:}

# ── Razorpay ──
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── Sentry ──
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.1
sentry.environment=${APP_PROFILE:dev}

# ── Cache (Caffeine) ──
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s

# ── File upload ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true

# ── Async thread pool ──
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=vidyasetu-async-

# ── Logging ──
logging.level.in.vidyasetu=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

# ── Server ──
server.port=8081
server.error.include-message=never
server.error.include-stacktrace=never
